title: sk-learn
description: >-
  A learning ladder of bite-sized study units. One atomic keyword per
  file, depth-first and progression-first.

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# just-the-docs settings
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 4
  preview_words_after: 4
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true
color_scheme: light

aux_links:
  "Learn":
    - "/learn/"

nav_external_links:
  - title: Source on GitHub
    url: https://github.com/shivakrishnak/sk-learn

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Permalinks honored from frontmatter
permalink: pretty

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .github/
  - learn/_config/*.py
  - learn/_config/*.ps1
  - "**/learning-path.md"

# Defaults
defaults:
  - scope:
      path: "learn"
      type: "pages"
    values:
      layout: default
